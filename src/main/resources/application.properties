spring.application.name=coinforge
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/coinforge
spring.data.mongodb.database=coinforge

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable Redis repositories to avoid conflicts
spring.data.redis.repositories.enabled=false

#for swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs